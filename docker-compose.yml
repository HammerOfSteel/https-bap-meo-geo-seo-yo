version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: randommenu_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-randommenu}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-randommenu_dev}
      POSTGRES_DB: ${DB_NAME:-randommenu_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-randommenu}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - randommenu_network

  # Express.js Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: randommenu_backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${DB_USER:-randommenu}:${DB_PASSWORD:-randommenu_dev}@postgres:5432/${DB_NAME:-randommenu_db}
      JWT_SECRET: ${JWT_SECRET:-your_secret_key_change_in_production}
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    networks:
      - randommenu_network
    entrypoint: /app/entrypoint.sh

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: randommenu_frontend
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - randommenu_network

volumes:
  postgres_data:

networks:
  randommenu_network:
    driver: bridge
